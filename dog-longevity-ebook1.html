<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1209;background-image:radial-gradient(ellipse at 30% 50%,#2d1a0e,transparent 60%),radial-gradient(ellipse at 70% 50%,#0e0a05,transparent 60%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif KR',Georgia,serif;padding:20px;user-select:none;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.book-outer{position:relative;width:720px;height:520px}

.page{width:720px;height:520px;background:#fdf6e3;border-radius:3px 10px 10px 3px;box-shadow:-3px 0 6px rgba(0,0,0,0.2),8px 8px 24px rgba(0,0,0,0.5),18px 18px 40px rgba(0,0,0,0.3),inset -4px 0 12px rgba(0,0,0,0.06);overflow:hidden;position:relative;transform-origin:left center;}
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.06) 50%,transparent 100%);z-index:20;pointer-events:none}
.page::after{content:'';position:absolute;right:0;top:0;bottom:0;width:16px;background:linear-gradient(to left,rgba(0,0,0,0.07),transparent);z-index:20;pointer-events:none}
.pc{padding:48px 64px 48px 72px;height:100%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(200,168,76,0.35) transparent}
.pc::-webkit-scrollbar{width:4px}
.pc::-webkit-scrollbar-track{background:transparent}
.pc::-webkit-scrollbar-thumb{background:rgba(200,168,76,0.4);border-radius:4px}
.pc.full{padding:0}
@keyframes fOut{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}}
@keyframes fIn{0%{transform:perspective(1400px) rotateY(18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
@keyframes fOutL{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(18deg);opacity:.4}}
@keyframes fInL{0%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
.fo{animation:fOut .28s ease forwards}.fi{animation:fIn .28s ease forwards}.fol{animation:fOutL .28s ease forwards}.fil{animation:fInL .28s ease forwards}
.pnum{position:absolute;bottom:18px;right:28px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#c9a84c;z-index:30}

.prog,.prog *{transition:height .15s ease,margin .15s ease}
.pfill{height:100%;background:linear-gradient(to right,#c9831a,#f0c040);border-radius:4px;transition:width .4s ease;pointer-events:none}
.prog-thumb{position:absolute;top:50%;right:0;transform:translate(50%,-50%);width:14px;height:14px;background:#f0c040;border-radius:50%;box-shadow:0 0 6px rgba(240,192,64,0.6);opacity:0;transition:opacity .15s;pointer-events:none}

.nav{display:flex;align-items:center;gap:20px}

.nbtn:hover:not(:disabled){background:rgba(255,255,255,0.18);color:#fff}
.nbtn:disabled{opacity:.28;cursor:not-allowed}
.pcnt{color:rgba(255,255,255,0.5);font-family:'Noto Sans KR',sans-serif;font-size:12px;min-width:70px;text-align:center}
.hint{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,0.22);text-align:center}

.cover-line{width:48px;height:1px;background:#d4a853;margin:16px auto}

.ctitle{font-size:30px;font-weight:700;color:#1a1a1a;line-height:1.5;margin-bottom:20px}
.cline{width:44px;height:3px;background:#8b6914;margin-bottom:24px}
.cintro{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#555;line-height:2}
.stitle{font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #e8d5a3}
.bt{font-family:'Noto Sans KR',sans-serif;font-size:13.5px;color:#3a3a3a;line-height:2.05;margin-bottom:14px}

.cg{margin-bottom:16px}

.toc-t{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#2a2a2a;flex:1}

.toc-p{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#8b6914}
.ep{background:linear-gradient(140deg,#0f2d20,#1e5035);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;color:#fff;padding:56px}

.side-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:40;width:52px;height:80px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);font-size:28px;cursor:pointer;transition:all .2s;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;line-height:1;font-family:sans-serif;}

.side-next{right:-62px;border-radius:0 10px 10px 0;}

</head>

`<div class="pc full"><div class="ctp"><div class="cnum">CHAPTER 1</div><div class="ctitle">노화로 착각하고<br>있는<br>노쇠의 증상</div><div class="cline"></div><div class="cintro">노화와 노쇠는 다릅니다.<br>구분하는 순간, 관리가 시작됩니다.<br>일찍 발견하면 진행을 늦추거나 일부 개선할 수 있습니다.</div></div></div>`,
`<div class="pc"><div class="stitle">노쇠란 무엇인가</div><p class="bt">'프레일티(Frailty)'는 우리말로 노쇠, 또는 허약이라고 번역됩니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="¹ Banzato T et al. A Frailty Index based on clinical data to quantify mortality risk in dogs. Prev Vet Med (2019)">¹</sup><sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="² Canine Geriatric Syndrome: A Framework for Advancing Research on Canine Aging. Geroscience (2019)">²</sup> 단순히 나이 든 것과는 다릅니다. 노쇠는 몸의 여러 시스템이 서서히 기능을 잃어가는 상태입니다.</p><ul class="cl"><li>근육이 줄고</li><li>체력이 떨어지며</li><li>작은 스트레스에도 회복이 느려지는 상태</li></ul><div class="kp"><div class="kpt">중요한 사실</div><p>프레일티 점수의 진짜 목적은 <strong>얼마나 살지를 예측하는 것이 아닙니다.</strong><br>지금 어떤 위험에 처해 있는지를 파악하고 개선하는 것이 목적입니다.<br><br>점수가 높게 나왔다면 그것은 경고 신호입니다 — 지금 당장 식단과 운동을 점검하고 수의사와 상담할 이유가 생긴 것입니다.</p></div></div>`,
`<div class="pc"><div class="stitle">집에서 확인하는 노쇠 체크포인트</div><div class="sh">🦴 신체 지표</div><ul class="cl"><li>최근 6개월간 체중이 눈에 띄게 줄었는가?</li><li>근육량이 감소해 등이나 엉덩이 뼈가 도드라지는가?</li><li>걷거나 계단을 오를 때 전보다 힘들어하는가?</li></ul><div class="sh">⚡ 활력 지표</div><ul class="cl"><li>산책 거리나 시간이 줄었는가?</li><li>이전에 좋아하던 놀이에 흥미를 잃었는가?</li><li>하루 중 자는 시간이 현저히 늘었는가?</li></ul><div class="sh">🔄 회복력 지표</div><ul class="cl"><li>가벼운 감기나 소화 문제에서 회복이 느려졌는가?</li><li>낯선 환경이나 사람에 대한 반응이 둔해졌는가?</li></ul><div class="hb"><p>세 영역 중 두 곳 이상에서 이상 신호가 보인다면 수의사와 상담하세요.</p></div></div>`,
`<div class="pc"><div class="stitle">노쇠 수준별 맞춤 관리 전략</div><table class="ct"><tr><th>노쇠 수준</th><th>주요 신호</th><th>권장 조치</th></tr><tr><td><strong>초기</strong></td><td>활발, 적정 체중 유지</td><td>현재 루틴 유지, 연 1회 혈액검사</td></tr><tr><td><strong>경증</strong></td><td>활동량 소폭 감소, 체중 변화 시작</td><td>식단 점검, 운동 강도 조절, 6개월 추적</td></tr><tr><td><strong>중증</strong></td><td>근육 감소, 무기력, 회복 지연</td><td>수의사 상담, 혈액검사, 맞춤 재활 프로그램</td></tr></table><div class="kp"><div class="kpt">희망의 메시지</div><p>노쇠는 되돌릴 수 없는 것이 아닙니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="¹ Banzato T et al. A Frailty Index based on clinical data to quantify mortality risk in dogs. Prev Vet Med (2019)">¹</sup> 적절한 개입으로 진행 속도를 늦추고, 경우에 따라서는 실제로 개선할 수 있습니다. 포기하기 전에 먼저 측정하세요.</p></div></div>`,
`<div class="pc"><div class="stitle">단순 노화일까요? 질병 신호일까요?</div>
<div class="hb" style="margin-bottom:14px"><p style="font-size:13px;line-height:2.1">"요즘 잠만 자요."<br>"산책을 싫어해요."<br>"소파도 잘 못 올라가고 물도 많이 마셔요…"</p></div>
<p class="bt">병원에서 정말 많이 듣는 이야기입니다.</p>
<p class="bt">보호자님들이 가장 많이 놓치는 부분이 있습니다. <strong>'노화'라고 생각했는데 사실은 치료가 필요한 신호인 경우</strong>가 생각보다 많다는 점입니다.</p>
<div class="kp"><div class="kpt">특히 7세 전후부터 (대형견은 5~6세, 소형견은 8~10세경부터)<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="² Canine Geriatric Syndrome: A Framework for Advancing Research on Canine Aging. Geroscience (2019)">²</sup></div><p>관절·근육·신경·호르몬 변화가 서서히 시작됩니다.<br><br>아이들은 말을 못하기 때문에, 우리는 <strong>작은 행동 변화를 먼저 알아차려야</strong> 합니다.</p></div></div>`,

<tr><td><strong>0.6 이상</strong></td><td>🔴 중증 노쇠</td><td>통증·질환 동반 가능성 높음, 치료 시급</td></tr>

<div class="cg" style="margin-bottom:14px">

`<div class="pc"><div class="stitle">가장 중요한 건 "원인 찾기"입니다</div>

`<div class="pc full"><div class="ctp"><div class="cnum">CHAPTER 2</div><div class="ctitle">지방은 단순한<br>살이 아니다</div><div class="cline"></div><div class="cintro">지방 조직은 살아 움직이는 내분비 기관입니다.<br>노화와 함께 이 조직이 어떻게 변하는지,<br>그리고 반려견의 건강에 어떤 의미를 갖는지 살펴봅니다.</div></div></div>`,
`<div class="pc"><div class="stitle">지방 조직, 오해와 진실</div><p class="bt">많은 보호자들이 반려견의 뱃살을 보며 "조금 통통한 게 귀엽잖아"라고 생각합니다. 하지만 과학은 다른 이야기를 합니다. 지방 조직은 단순히 남은 칼로리를 쌓아두는 창고가 아닙니다. 그것은 <strong>살아 움직이는 내분비 기관</strong>입니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="³ Kershaw EE & Flier JS. Adipose tissue as an endocrine organ. J Clin Endocrinol Metab (2004)">³</sup></p><p class="bt">지방세포는 혈당을 조절하는 호르몬을 분비하고, 염증 반응을 통제하며<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="³ Kershaw EE & Flier JS. Adipose tissue as an endocrine organ. J Clin Endocrinol Metab (2004)">³</sup>, 면역계와 끊임없이 대화를 나눕니다. 건강한 지방 조직은 몸의 균형을 잡는 완충제 역할을 하지만, 노화가 시작되면 이 조직이 서서히 변질됩니다.</p><div class="hb"><p>🔬 인간과 개 모두에서, 노화가 진행될수록 지방 조직의 총량이 증가하고 그 질은 나빠집니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="² Canine Geriatric Syndrome: A Framework for Advancing Research on Canine Aging. Geroscience (2019)">²</sup><sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="³ Kershaw EE & Flier JS. Adipose tissue as an endocrine organ. J Clin Endocrinol Metab (2004)">³</sup> 이것이 노화 관련 질환의 핵심 원인 중 하나입니다.</p></div></div>`,
`<div class="pc"><div class="stitle">지방의 위치가 바뀐다</div><div class="sh">피하지방 → 내장지방</div><p class="bt">젊고 건강한 개의 지방은 대부분 피부 바로 아래, 피하지방 형태로 존재합니다. 피하지방은 체온을 유지하고 충격을 흡수하는 순기능을 담당합니다.</p><p class="bt">그런데 나이가 들면 같은 양의 지방이라도 저장되는 위치가 달라집니다. 복강 안쪽 장기 주변에 지방이 쌓이기 시작하는 것입니다. 이것이 바로 <strong>내장지방</strong>입니다.</p><div class="hb"><p>⚠️ 내장지방은 혈류와 직접 맞닿아 있어 지방산을 혈액 속으로 지속적으로 내보내며 인슐린 저항성을 악화시킵니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁴ Fasshauer M & Blüher M. The complex immunological and inflammatory network of adipose tissue in obesity. Trends Pharmacol Sci (2015)">⁴</sup></p></div><p class="bt">배가 나온 노견을 보면 단순히 "살이 쪘다"가 아니라, 지방이 위험한 위치에 쌓이고 있다는 신호로 읽어야 합니다.</p></div>`,
`<div class="pc"><div class="stitle">비만·과체중 상태의 지방세포는 염증을 만든다</div><p class="bt">건강한 지방세포는 <strong>아디포넥틴(adiponectin)</strong>이라는 물질을 분비합니다. 아디포넥틴은 인슐린 민감성을 높이고 에너지 소비를 촉진하는 보호성 호르몬입니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁴ Fasshauer M & Blüher M. The complex immunological and inflammatory network of adipose tissue in obesity. Trends Pharmacol Sci (2015)">⁴</sup></p><p class="bt">그런데 노화된 지방세포는 정반대로 작동합니다.</p><ul class="cl"><li>아디포넥틴 분비는 <strong>줄어들고</strong></li><li>염증을 유발하는 사이토카인 분비는 <strong>늘어납니다</strong></li></ul><p class="bt">결과적으로 몸 전체가 만성 염증 상태에 놓이게 됩니다.</p><div class="kp"><div class="kpt">KEY POINT</div><p>만성 염증은 관절염, 당뇨, 심장 질환, 심지어 암의 토양이 됩니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁴ Fasshauer M & Blüher M. The complex immunological and inflammatory network of adipose tissue in obesity. Trends Pharmacol Sci (2015)">⁴</sup> 노견에게서 흔히 보이는 여러 질환들이 사실은 이 지방 조직의 변질에서 시작됩니다.</p></div></div>`,
`<div class="pc"><div class="stitle">견종별 지방 조직 건강 격차</div><p class="bt">연구에 따르면 비만·과체중 상태의 개는 정상 체중 개에 비해 만성질환 발생률과 조기 사망률이 유의하게 높습니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁵ Lund EM et al. Prevalence and risk factors for obesity in adult dogs. Intern J Appl Res Vet Med (2006)">⁵</sup> 체지방의 양 자체가 질병 위험을 높이는 독립적인 요인으로 확인됩니다.</p><p class="bt">쥐를 대상으로 한 실험에서는 복강 내 지방 조직(오멘텀)을 외과적으로 제거했더니 인슐린 민감성이 뚜렷하게 향상되었습니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁵ Lund EM et al. Prevalence and risk factors for obesity in adult dogs. Intern J Appl Res Vet Med (2006)">⁵</sup><sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁶ Barzilai N et al. Surgical removal of visceral fat reverses hepatic insulin resistance. Diabetes (1999)">⁶</sup></p><div class="hb"><p>💡 수술로 지방을 제거할 수는 없지만, 이 실험이 주는 메시지는 명확합니다.<br><br>지방 조직의 건강 → 인슐린 민감성 → 건강 수명<br><br>보호자가 할 수 있는 일은 <strong>적정 체중을 지키고 내장지방이 쌓이지 않도록</strong> 하는 것입니다.</p></div></div>`,
`<div class="pc"><div class="stitle">6 : 3 : 1 법칙 — 지방을 줄이는 식단</div>
<p class="bt">지방 조직을 건강하게 유지하려면 무엇을 먹느냐가 핵심입니다. 보호자가 바로 시작할 수 있는 방법이 바로 <strong>6:3:1 식단 비율</strong>입니다.</p>
<div class="hb" style="text-align:center;padding:18px">
  <p style="font-size:16px;line-height:2.8;font-weight:600">🥩 단백질 6 <span style="font-size:12px;font-weight:400">(닭가슴살·살코기 — 양념❌ 기름❌)</span><br>🍚 사료 3<br>🥦 채소 1 <span style="font-size:12px;font-weight:400">(브로콜리·단호박·애호박)</span></p>

<div class="sh">하루 급여량 계산</div>
<div class="kp"><div class="kpt">핵심 공식</div><p><strong>목표 체중(kg) × 2%</strong> = 하루 총 급여량<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁹ Kraus C et al. Body weight, not lean body mass, is best for estimating the energy requirements in dogs. J Nutr (2013)">⁹</sup><br><br>예시) 목표 체중 5kg → 하루 100g<br>→ 닭가슴살 60g + 사료 30g + 채소 10g<br><br>현재 7kg이어도 목표가 5kg이면 <strong>5kg 기준</strong>으로 계산합니다.</p></div><div class="hb" style="margin-top:12px;padding:10px 14px"><p style="font-size:12px;line-height:1.8;margin:0">⚠️ 장기 적용 시 미량 영양소가 부족할 수 있습니다.<br>혈액 수치 확인 후 진행하시기를 권유드립니다.</p></div></div>`,

`<div class="pc"><div class="stitle">시작 전 반드시 체크하세요</div><div class="sh">1. 우리 아이에게 맞는 식단인지 확인</div><p class="bt">닭가슴살은 체중관리에 도움이 될 수 있지만, 아이 상태에 맞는 양 조절이 중요합니다. 처음엔 <strong>소량부터 천천히 시작</strong>해 변 상태, 식욕, 컨디션을 보며 조절하세요.</p><div class="sh">2. 알레르기 반응 체크</div><ul class="cl"><li>눈물이 많아졌다</li><li>귀를 자꾸 긁는다</li><li>발을 핥는다 / 몸을 긁는다</li><li>변 상태가 달라졌다</li></ul><div class="hb"><p>이런 증상이 보이면 단백질원을 바꿔보세요.<br>닭고기 → 연어 또는 오리<br>동물성 단백질이 안 맞으면 → 두부 소량 (염분 제거 후 급여)</p></div></div>`,
`<div class="pc"><div class="stitle">6 : 3 : 1 식단 비율</div><div class="hb" style="text-align:center;padding:22px 18px"><p style="font-size:17px;line-height:2.8;font-weight:600">🥩 단백질 6<br><span style="font-size:13px;font-weight:400">(닭가슴살, 살코기 — 양념❌ 기름❌)</span><br>🍚 사료 3<br>🥦 채소 1<br><span style="font-size:13px;font-weight:400">(브로콜리, 단호박, 애호박)</span></p></div><div class="sh">하루 급여량 계산법</div><div class="kp"><div class="kpt">핵심 공식</div><p><strong>현재 체중이 아닌 목표 체중</strong>의 약 2% = 하루 총 급여량<br><br>예시) 목표 체중 5kg → 하루 100g<br>→ 닭가슴살 60g + 사료 30g + 채소 10g</p></div><p class="bt" style="margin-top:12px">현재 7kg이라도 목표가 5kg이면 5kg 기준으로 계산합니다. 이것이 핵심입니다.</p><div class="hb" style="margin-top:12px;padding:10px 14px"><p style="font-size:12px;line-height:1.8;margin:0">⚠️ 장기 적용 시 미량 영양소가 부족할 수 있습니다.<br>혈액 수치 확인 후 진행하시기를 권유드립니다.</p></div></div>`,
`<div class="pc"><div class="stitle">단백질원 선택과 장 건강</div><p class="bt">반복적인 설사나 묽은 변이 있다면 단순히 "장이 약한가 보다"가 아니라 <strong>특정 단백질원이 맞지 않는 신호</strong>일 수 있습니다.</p><div class="sh">만성장병증 신호</div><ul class="cl"><li>설사나 묽은 변이 반복된다</li><li>좋아졌다가 다시 나빠지기를 반복한다</li></ul><div class="hb"><p>장 염증이 오래 반복되면 췌장에도 부담을 줄 수 있습니다.<br>"좋은 음식"보다 <strong>"우리 아이 몸에 맞는 단백질 찾기"</strong>가 더 중요합니다.</p></div><table class="ct"><tr><th>상황</th><th>추천 대안</th></tr><tr><td>닭고기 알레르기</td><td>연어, 오리</td></tr><tr><td>동물성 단백질 예민</td><td>가수분해 단백 사료</td></tr><tr><td>보조 단백질</td><td>두부 소량 (염분 제거 필수)</td></tr></table></div>`,
`<div class="pc"><div class="stitle">간식 관리와 체중관리의 진짜 목표</div><div class="hb"><p>⚠️ 체중 변화가 더디다면? <strong>한 입 간식</strong>을 점검하세요.<br>가족들이 하나씩 주는 간식이 생각보다 많은 칼로리를 만들 수 있습니다.</p></div><div class="sh">실제 사례에서 나타난 변화</div><ul class="cl"><li>움직임이 조금 가벼워졌다</li><li>산책할 때 덜 힘들어한다</li><li>숨참이 줄어든 것 같다</li></ul><div class="kp"><div class="kpt">체중관리의 진짜 목표</div><p>단순히 몇 kg 빠졌는가가 아니라 <strong>체형이 어떻게 변했는가</strong>입니다.<br><br>살만 빠지고 근육까지 줄면 다리에 힘이 떨어지고 움직임이 더 불편해집니다.<br><br>✔ 체중 감량 + ✔ 근육 유지 + ✔ 움직임 개선<br>이 세 가지가 함께 가야 건강한 다이어트입니다.</p></div></div>`,
`<div class="pc full"><div class="ctp"><div class="cnum">CHAPTER 3</div><div class="ctitle">덜 먹으면<br>더 오래 산다</div><div class="cline"></div><div class="cintro">칼로리 제한의 과학<br><br>"얼마나 먹느냐"가 "얼마나 오래 사느냐"와<br>직결된다는 사실은 이미 수십 년의 연구를 통해<br>입증되었습니다.</div></div></div>`,
`<div class="pc"><div class="stitle">먹는 양이 수명을 결정한다</div><p class="bt">선충, 초파리, 쥐에 이르기까지 칼로리를 줄였을 때 수명이 연장된다는 결과는 일관되게 나타납니다. (영장류 연구는 일부 결과가 엇갈리나 전반적인 경향은 유사합니다.)<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁷ Kealy RD et al. Effects of diet restriction on life span and age-related changes in dogs. J Am Vet Med Assoc (2002)">⁷</sup><sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁸ Fontana L et al. Extending healthy life span — from yeast to humans. Science (2010)">⁸</sup> 그리고 이 원리는 우리의 반려견에게도 동일하게 적용됩니다.</p><div class="hb"><p>📊 <strong>개 대상 장기 연구 결과 (Purina, 2002)</strong><br><br>칼로리를 25% 제한한 래브라도 레트리버 그룹은 일반 식단 그룹보다 <strong>평균 1.8년 더 오래 살았으며<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁷ Kealy RD et al. Effects of diet restriction on life span and age-related changes in dogs. J Am Vet Med Assoc (2002)">⁷</sup></strong>, 만성질환 발생 시점도 뚜렷하게 늦춰졌습니다.</p></div><p class="bt">1.8년은 단순히 "조금 더 오래 산" 것이 아닙니다. 질병 없이 건강하게 보내는 시간이 그만큼 늘어나는 것입니다.</p></div>`,
`<div class="pc"><div class="stitle">왜 덜 먹으면 건강해지는가</div><div class="sh">인슐린이 핵심이다</div><p class="bt">음식을 먹으면 혈당이 오르고, 혈당이 오르면 인슐린이 분비됩니다. 이 과정이 반복될수록 세포는 인슐린에 둔감해지고 — 인슐린 저항성이 생깁니다. 저항성이 생기면 몸은 더 많은 인슐린을 분비해 보상하려 하고, 결국 혈중 인슐린 수치는 만성적으로 높게 유지됩니다.</p><div class="kp"><div class="kpt">악순환의 고리</div><p>높은 인슐린 수치 → 세포 과증식 촉진 → 염증 증가 → 암·질환 위험 상승<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁷ Kealy RD et al. Effects of diet restriction on life span and age-related changes in dogs. J Am Vet Med Assoc (2002)">⁷</sup><sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁸ Fontana L et al. Extending healthy life span — from yeast to humans. Science (2010)">⁸</sup></p></div><p class="bt">칼로리 제한은 이 악순환을 끊습니다. 연구에서 칼로리를 제한한 그룹은 인슐린 대사가 개선되어 인슐린 저항성이 현저히 낮았고<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="⁷ Kealy RD et al. Effects of diet restriction on life span and age-related changes in dogs. J Am Vet Med Assoc (2002)">⁷</sup>, 인슐린 수치가 낮게 유지된 개체일수록 건강 상태가 좋았습니다.</p></div>`,
`<div class="pc"><div class="stitle">핵심 공식과 실천 가이드</div><div class="hb" style="text-align:center;padding:20px 18px"><p style="font-size:16px;line-height:2.6;font-weight:600">덜 먹으면<br>↓<br>인슐린이 안정되고<br>↓<br>세포가 젊게 유지된다</p></div><div class="sh">오늘 바로 실천하기</div><ul class="cl"><li>매일 같은 시간, <strong>정해진 양만</strong> 급여한다</li><li>간식 칼로리는 하루 총량의 <strong>10% 이내</strong>로 제한한다</li><li>사람 음식 공유는 원칙적으로 금지한다</li><li>월 1회 체중을 측정하고 기록한다</li><li>수의사와 함께 적정 체중 목표를 설정한다</li></ul><p class="bt" style="margin-top:14px">밥을 줄이는 것이 아니라, <strong>정확하게 주는 것</strong>이 시작입니다.</p></div>`,
`<div class="pc full"><div class="ctp"><div class="cnum">CHAPTER 4</div><div class="ctitle">오늘부터 실천하는<br>건강 수명 연장<br>루틴</div><div class="cline"></div><div class="cintro">매일 반복되는 작은 선택들이 쌓여<br>10년 후의 건강을 만듭니다.<br><br>과학이 알려준 것,<br>보호자가 할 수 있는 것.</div></div></div>`,
`<div class="pc"><div class="stitle">첫 번째 — 체중 관리</div><p class="bt">체중 관리는 반려견 건강에서 보호자가 직접 통제할 수 있는 <strong>가장 강력한 단일 변수</strong>입니다. 연구들은 일관되게 과체중이 거의 모든 질환의 위험을 높인다는 것을 보여줍니다.</p><div class="sh">적정 체중 확인법 (Body Condition Score)</div><ul class="cl"><li>갈비뼈를 손으로 눌렀을 때 <strong>쉽게 만져지면</strong> 적정</li><li>위에서 봤을 때 <strong>허리가 살짝 들어오면</strong> 적정</li><li>옆에서 봤을 때 <strong>배가 앞다리보다 살짝 올라가 있으면</strong> 적정</li></ul><div class="hb"><p>⚠️ 체중이 기준보다 20% 이상 많다면, 단기간에 무리하게 줄이려 하지 말고 수의사와 함께 3~6개월 감량 계획을 세우세요.</p></div></div>`,
`<div class="pc"><div class="stitle">두 번째 — 균형 잡힌 식단</div><p class="bt">칼로리 양만큼이나 중요한 것이 영양의 질입니다.</p><div class="sh">식단 구성 원칙</div><ul class="cl"><li><strong>단백질을 충분히:</strong> 근육 유지에 필수. 건강한 노견일수록 단백질 요구량이 올라갑니다 (신장 질환이 있는 경우 수의사와 상의)</li><li><strong>정제 탄수화물 최소화:</strong> 혈당 스파이크를 줄여 인슐린 안정에 기여합니다</li><li><strong>오메가-3 지방산 포함:</strong> 염증 억제, 관절 및 인지 기능 보호</li><li><strong>가공 간식 줄이기:</strong> 당분·염분이 높은 간식은 내장지방 축적을 촉진합니다</li></ul><div class="kp"><div class="kpt">핵심 원칙</div><p>식이 보충제(오메가-3, 항산화제 등)는 수의사와 상의 후 도입하되, <strong>기본 식단의 균형이 먼저</strong>입니다.</p></div></div>`,
`<div class="pc"><div class="stitle">세 번째 — 규칙적인 운동</div><p class="bt">운동은 인슐린 민감성을 높이고, 근육량을 유지하며<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="¹⁰ 하나로 양한방 동물병원 박정식 원장 임상 경험 및 인터뷰 (2025)">¹⁰</sup>, 지방 조직을 건강하게 유지하는 가장 효과적인 방법입니다.</p><table class="ct"><tr><th>나이</th><th>운동 방식</th><th>권장 시간</th></tr><tr><td>~5세</td><td>활발한 달리기, 공놀이</td><td>하루 45~60분</td></tr><tr><td>5~8세</td><td>규칙적인 산책 + 가벼운 놀이</td><td>하루 30~45분</td></tr><tr><td>8세 이상</td><td>천천히 걷기, 수영(관절 부담 최소)</td><td>하루 20~30분, 2회 분산</td></tr></table><div class="hb"><p>💪 노견이라고 운동을 줄이는 것은 오히려 독이 됩니다.<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="¹⁰ 하나로 양한방 동물병원 박정식 원장 임상 경험 및 인터뷰 (2025)">¹⁰</sup><br><strong>강도를 낮추되 빈도는 유지</strong>하는 것이 핵심입니다.</p></div></div>`,
`<div class="pc"><div class="stitle">네 번째 — 정신적 자극</div><p class="bt">신체 건강만큼 중요한 것이 인지 건강입니다. 정신적으로 활발한 개는 노화가 더 느리게 진행된다는<sup style="font-size:9px;color:#8b6914;font-weight:700;cursor:help" title="² Canine Geriatric Syndrome: A Framework for Advancing Research on Canine Aging. Geroscience (2019)">²</sup> 연구에서 시사되고 있습니다.</p><div class="sh">일상 속 정신 자극 방법</div><ul class="cl"><li>식사를 <strong>노즈워크나 퍼즐 피더</strong>로 제공하기</li><li>매일 새로운 냄새 탐색 산책 (같은 길이라도 충분히 킁킁거리게)</li><li>간단한 트릭 훈련 10분: 앉아, 기다려, 손 등 기존 것 복습</li><li>주 1~2회 새로운 장소 방문</li></ul><div class="kp"><div class="kpt">왜 뇌 자극이 중요한가</div><p>사람도 나이 들수록 새로운 것을 배우면 뇌 노화가 늦춰지듯, 개도 마찬가지입니다. 몸과 뇌를 함께 관리하세요.</p></div></div>`,
`<div class="pc"><div class="stitle">보호자 일상 체크리스트 (1)</div><div class="cg"><div class="cgtitle">📅 매일 확인</div><div class="ci"><div class="cb"></div>정해진 양의 식사 급여</div><div class="ci"><div class="cb"></div>연령에 맞는 20~60분 운동</div><div class="ci"><div class="cb"></div>음수량 확인 (물을 잘 마시는지)</div><div class="ci"><div class="cb"></div>대소변 상태 관찰</div></div><div class="cg"><div class="cgtitle">📆 매주 확인</div><div class="ci"><div class="cb"></div>체형 육안 확인 (갈비뼈 촉진)</div><div class="ci"><div class="cb"></div>활동량·식욕 변화 여부 체크</div><div class="ci"><div class="cb"></div>정신 자극 활동 1~2회 실시</div></div></div>`,
`<div class="pc"><div class="stitle">보호자 일상 체크리스트 (2)</div><div class="cg"><div class="cgtitle">📊 매월 확인</div><div class="ci"><div class="cb"></div>체중 측정 및 기록</div><div class="ci"><div class="cb"></div>눈, 귀, 피부, 치아 간이 점검</div><div class="ci"><div class="cb"></div>간식 및 식단 구성 재점검</div></div><div class="cg"><div class="cgtitle">🏥 매년 확인</div><div class="ci"><div class="cb"></div>종합 혈액검사 (7세 이상은 6개월마다)</div><div class="ci"><div class="cb"></div>수의사와 영양·체중 목표 재검토</div><div class="ci"><div class="cb"></div>노쇠 지표(프레일티) 점검</div></div><div class="hb"><p>💡 이 체크리스트를 인쇄해서 냉장고에 붙여두면 꾸준히 실천하는 데 도움이 됩니다.</p></div></div>`,
`<div class="pc full"><div class="ep"><div style="font-size:48px;margin-bottom:20px">🐾</div><h2>오늘의 선택이<br>10년을 만듭니다</h2><div class="ep-line"></div><p>반려견은 우리에게 묻지 않습니다.<br>밥을 얼마나 줄지, 얼마나 걸을지,<br>어떤 간식을 줄지 — 모든 선택은 보호자의 몫입니다.<br><br>그것은 엄청난 책임이지만,<br>동시에 엄청난 기회이기도 합니다.<br><br><strong>더 오래, 더 건강하게.<br>그 시간은 만들어지는 것입니다.</strong></p></div></div>`,
`<div class="pc" style="height:100%;display:flex;flex-direction:column">
<div class="stitle" style="margin-bottom:12px">참고문헌</div>
<div style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(200,168,76,0.35) transparent;padding-right:4px">

<div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;color:#8b6914;letter-spacing:2px;margin:6px 0 8px;padding:4px 8px;background:#fef9ee;border-radius:4px">CHAPTER 1 — 노쇠 (Frailty)</div>

<div style="margin-bottom:12px;padding:10px 12px;background:#f9f6ee;border-radius:6px;border-left:3px solid #d4a017">
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#3a2a0a;margin-bottom:4px"><sup style="color:#8b6914">¹</sup> Banzato T, Cherubini GB, Mortari AC et al.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11.5px;color:#444;line-height:1.75;font-style:italic">A Frailty Index based on clinical data to quantify mortality risk in dogs.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#888;margin-top:3px">Preventive Veterinary Medicine, Vol.167, pp.1–6 (2019)</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#5a7a5a;margin-top:4px;line-height:1.6">→ 개에서 14개 임상 변수로 구성된 노쇠지수(FI) 개발. FI ≥ 0.4 시 사망 위험 유의하게 증가 확인.</div>
</div>

<div style="margin-bottom:12px;padding:10px 12px;background:#f9f6ee;border-radius:6px;border-left:3px solid #d4a017">
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#3a2a0a;margin-bottom:4px"><sup style="color:#8b6914">²</sup> Creevy KE, Akey JM, Kaeberlein M et al.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11.5px;color:#444;line-height:1.75;font-style:italic">Canine Geriatric Syndrome: A Framework for Advancing Research on Canine Aging.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#888;margin-top:3px">GeroScience, Vol.41, pp.653–663 (2019)</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#5a7a5a;margin-top:4px;line-height:1.6">→ 반려견 노화를 종합적 증후군으로 정의. 노화·지방조직·염증·인지 저하의 상호작용 체계 제시.</div>
</div>

<div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;color:#8b6914;letter-spacing:2px;margin:8px 0;padding:4px 8px;background:#fef9ee;border-radius:4px">CHAPTER 2 — 지방 조직 (Adipose Tissue)</div>

<div style="margin-bottom:12px;padding:10px 12px;background:#f9f6ee;border-radius:6px;border-left:3px solid #d4a017">
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#3a2a0a;margin-bottom:4px"><sup style="color:#8b6914">³</sup> Kershaw EE, Flier JS.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11.5px;color:#444;line-height:1.75;font-style:italic">Adipose tissue as an endocrine organ.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#888;margin-top:3px">Journal of Clinical Endocrinology & Metabolism, Vol.89(6), pp.2548–2556 (2004)</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#5a7a5a;margin-top:4px;line-height:1.6">→ 지방세포가 렙틴·아디포넥틴·레지스틴 등 내분비 호르몬을 분비하는 능동적 기관임을 규명.</div>
</div>

<div style="margin-bottom:12px;padding:10px 12px;background:#f9f6ee;border-radius:6px;border-left:3px solid #d4a017">
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:#3a2a0a;margin-bottom:4px"><sup style="color:#8b6914">⁴</sup> Fasshauer M, Blüher M.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11.5px;color:#444;line-height:1.75;font-style:italic">The complex immunological and inflammatory network of adipose tissue in obesity.</div>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#888;margin-top:3px">Trends in Pharmacological Sciences, Vol.36(7), pp.461–470 (2015)</div>

const FULL=['cover','ctp','ep'];
function isFullPage(html){return FULL.some(c=>html.includes('class="'+c+'"'))}
let cur=0,busy=false;
const total=pages.length;
function chk14(el){
  const cb=el.querySelector('.cb');
  const on=el.getAttribute('data-checked')==='1';
  if(on){
    el.setAttribute('data-checked','0');
    cb.style.cssText='';cb.textContent='';
    el.style.background='';el.style.color='';
  } else {
    el.setAttribute('data-checked','1');
    cb.style.cssText='background:#1e5035;border-color:#1e5035;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;';
    cb.textContent='✓';
    el.style.background='rgba(30,80,53,0.07)';el.style.color='#1e5035';
  }
  const cnt=document.querySelectorAll('#cl14-wrap [data-checked="1"]').length;
  const idx=cnt/14;
  const sc=document.getElementById('fi-score');
  const st=document.getElementById('fi-status');
  const co=document.getElementById('fi-count');
  if(co)co.textContent=cnt+' / 14';
  if(sc)sc.textContent=idx.toFixed(2);
  const levels=[
    {max:0.2,label:'✅ 건강',color:'#1e5035'},
    {max:0.4,label:'⚠️ 초기 노쇠',color:'#b07d00'},
    {max:0.6,label:'🟠 경증 노쇠',color:'#b05000'},
    {max:2,  label:'🔴 중증 노쇠',color:'#c0392b'}
  ];
  const lv=levels.find(l=>idx<l.max)||levels[3];
  if(st){st.textContent=lv.label;st.style.color=lv.color;}
  if(sc)sc.style.color=lv.color;
}

function render(){
  const html=pages[cur];
  const pc=document.getElementById('pc');
  pc.innerHTML=html;
  pc.className=isFullPage(html)?'pc full':'pc';
  pc.scrollTop=0;
  document.getElementById('pnum').textContent=(cur===0||cur===total-1)?'':cur+1;
  document.getElementById('pcnt').textContent=(cur+1)+' / '+total;
  const pct=((cur+1)/total)*100;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('prog-thumb').style.left=pct+'%';
  ['pb','pb2'].forEach(id=>document.getElementById(id).disabled=cur===0);
  ['nb','nb2'].forEach(id=>document.getElementById(id).disabled=cur===total-1);
}
function go(idx,dir){
  if(busy||idx<0||idx>=total)return;
  busy=true;
  const pg=document.getElementById('page');
  const outC=dir==='next'?'fo':'fol';
  const inC=dir==='next'?'fi':'fil';
  pg.classList.add(outC);
  setTimeout(()=>{pg.classList.remove(outC);cur=idx;render();pg.classList.add(inC);setTimeout(()=>{pg.classList.remove(inC);busy=false},280);},280);
}
function next(){go(cur+1,'next')}
function prev(){go(cur-1,'prev')}
const progEl=document.getElementById('prog');
let dragging=false;
function seekByEvent(e){
  const rect=progEl.getBoundingClientRect();
  const x=Math.max(0,Math.min(e.clientX-rect.left,rect.width));
  const idx=Math.round((x/rect.width)*(total-1));
  if(idx!==cur)go(idx,idx>cur?'next':'prev');
}
progEl.addEventListener('mousedown',e=>{dragging=true;seekByEvent(e);e.preventDefault();});
document.addEventListener('mousemove',e=>{if(dragging)seekByEvent(e);});
document.addEventListener('mouseup',()=>{dragging=false;});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
let tx=0;
const pg=document.getElementById('page');
pg.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
pg.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50){d>0?next():prev();}},{passive:true});
let wt=0;
document.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)<40)return;
  const pc=document.getElementById('pc');
  const scrollable=pc.scrollHeight>pc.clientHeight+10;
  if(scrollable){if(e.deltaY>0&&pc.scrollTop+pc.clientHeight<pc.scrollHeight-4)return;if(e.deltaY<0&&pc.scrollTop>0)return;}
  const now=Date.now();if(now-wt<400)return;wt=now;
  if(e.deltaY>0)next();else prev();
},{passive:true});
render();
</script>
